<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Payment Successful</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;padding:40px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
                    <tr>
                        <td style="background-color:#059669;padding:32px 40px;text-align:center;">
                            <h1 style="color:#ffffff;margin:0;font-size:24px;font-weight:600;">Cognitia</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:40px;">
                            <h2 style="color:#1a1a2e;margin:0 0 16px;font-size:20px;font-weight:600;">Payment Successful</h2>
                            <p style="color:#51545e;font-size:15px;line-height:1.6;margin:0 0 24px;">
                                Your payment has been processed successfully. Here are the details:
                            </p>
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;border-radius:6px;margin:0 0 24px;">
                                <tr>
                                    <td style="padding:20px;">
                                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td style="color:#51545e;font-size:14px;padding:6px 0;">Plan</td>
                                                <td style="color:#1a1a2e;font-size:14px;font-weight:600;text-align:right;padding:6px 0;" th:text="${planName}">Pro Plan</td>
                                            </tr>
                                            <tr>
                                                <td style="color:#51545e;font-size:14px;padding:6px 0;">Amount</td>
                                                <td style="color:#1a1a2e;font-size:14px;font-weight:600;text-align:right;padding:6px 0;" th:text="${amount}">&#8377;999</td>
                                            </tr>
                                            <tr>
                                                <td style="color:#51545e;font-size:14px;padding:6px 0;">Date</td>
                                                <td style="color:#1a1a2e;font-size:14px;font-weight:600;text-align:right;padding:6px 0;" th:text="${date}">Jan 1, 2026</td>
                                            </tr>
                                            <tr th:if="${orderId}">
                                                <td style="color:#51545e;font-size:14px;padding:6px 0;">Order ID</td>
                                                <td style="color:#1a1a2e;font-size:14px;font-weight:600;text-align:right;padding:6px 0;" th:text="${orderId}">ORD-123</td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                            <p style="color:#51545e;font-size:14px;line-height:1.6;margin:0;">
                                Thank you for your purchase. Your plan is now active.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color:#f4f4f7;padding:24px 40px;text-align:center;">
                            <p style="color:#9a9ea6;font-size:13px;margin:0;">&copy; Cognitia. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
